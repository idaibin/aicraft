name: Validate Skills

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: validate-skills-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install validation dependency
        run: python -m pip install --requirement requirements-dev.txt

      - name: Check shared protocols
        run: python scripts/sync-shared-protocols.py --check

      - name: Validate packages
        run: python scripts/validate-skills.py

      - name: Run validator regressions
        run: python -m unittest discover -s scripts -p 'test_*.py'

      - name: Check whitespace
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [[ "$BASE_SHA" =~ ^0+$ ]]; then
            git show --check --format= HEAD
          else
            git diff --check "$BASE_SHA"...HEAD
          fi
