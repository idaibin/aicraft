interface:
  display_name: "Ops Browser"
  short_description: "Perform capability-aware low-level browser operations"
  default_prompt: "Use $ops-browser to inspect, verify, screenshot, or operate browser pages. Collect Browser Debug Evidence only after $diagnose delegation or an already-isolated browser-layer evidence request; route unexplained or cross-system root-cause requests to $diagnose before browser operation. Return direct evidence without deciding the final cause/fix, remove disposable browser state, and retain referenced evidence until transferred. When called by $chatgpt-review-bridge, perform only its routed low-level actions and leave package, send authorization, rounds, attribution, and response archiving to the bridge."
