interface:
  display_name: "Frontend Audit"
  short_description: "Audit selected React, Vue, UI, or desktop profiles"
  default_prompt: "Use $audit-frontend for a read-only frontend domain audit or a bounded specialist review under $code-review or $repo-review. Detect the product surface, framework, and local React/Vue API style, then explicitly select only applicable Architecture/Reuse, State/Data/Contracts, Component/Layout/Design System, Accessibility, Performance, and Desktop Boundary profiles; mark the rest Out of scope. Report severity-ranked evidence, exact locations, impact, remediation direction, validation gaps, and excluded profiles. Route fixes to $implement-frontend and Git mutation to $code-delivery."
