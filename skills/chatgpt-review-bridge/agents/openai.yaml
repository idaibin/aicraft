interface:
  display_name: "ChatGPT Review Bridge"
  short_description: "Prepare packages or run authorized ChatGPT review loops"
  default_prompt: "Use $chatgpt-review-bridge to prepare a review package or run explicitly authorized external rounds. Treat preparation as Package-only. For browser work, require one browser-operation/v1 Capability Snapshot; imported browser data may assist discovery or login but never proves identity, authorization, target, or submission state. Create a Handoff Request and operation-ledger entry before each state-changing action, accept the same operation_id in the $ops-browser result, and never repeat submitted or ambiguous operations. Keep review.md local-private by default, sanitize repository copies, and verify every finding locally."
