  short_description: "Verify desktop apps through platform-specific adapters"
  default_prompt: "Use $ops-client to identify and operate a specified real desktop client or collect bounded Client Debug Evidence only after $diagnose delegation or an already-isolated client-layer evidence request. Route unexplained or cross-system root-cause requests to $diagnose before client operation. Run capability preflight, use only the available platform adapter, return direct evidence without deciding the final cause/fix, remove disposable probes/test instances, and retain referenced evidence until transferred. Use $implement-frontend or the relevant native implementation skill for code changes."
