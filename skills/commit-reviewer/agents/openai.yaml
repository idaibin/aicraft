interface:
  display_name: "Commit Reviewer"
  short_description: "Review, commit-plan, or upgrade commit workflows"
  default_prompt: "Use Commit Reviewer to inspect the full local git change scope, review changed code against repository structure, conventions, docs, and validation checks, then split the work into feature-based commit groups with exact path-limited staging commands and concise Conventional Commit messages. If updating the skill from upstream, compare the trusted source first and preview proposed changes before writing. Do not commit unless explicitly asked."
