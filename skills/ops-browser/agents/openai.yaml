interface:
  display_name: "Ops Browser"
  short_description: "Perform capability-aware low-level browser operations"
  default_prompt: "Use $ops-browser to inspect, verify, screenshot, or operate browser pages. Return a browser-operation/v1 Capability Snapshot for delegated routes. Treat imported browser data only as discovery or login assistance and independently verify identity, target, authorization, and operation state. For $chatgpt-review-bridge, require a complete Handoff Request, preserve operation_id, return direct before/action/side-effect/after evidence, and stop on blocked or ambiguous state without retrying. Leave authorization, package, rounds, operation ledger, retry decisions, attribution, and archiving to the bridge. Collect debug evidence only after $diagnose delegation or an already-isolated request; route unexplained failures to $diagnose before browser operation and do not decide the final cause/fix."
